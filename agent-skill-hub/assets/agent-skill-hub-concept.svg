<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="470" viewBox="0 0 1500 470" role="img" aria-labelledby="title desc">
  <title id="title">agent-skill-hub concept diagram</title>
  <desc id="desc">Input, Process, Output, Next Input の流れと、Context と Context Update の循環を示す図。</desc>
  <style>
    .bg { fill: #f6f9fc; }
    .box { fill: #ffffff; stroke: #0d5ea6; stroke-width: 2; rx: 18; ry: 18; }
    .box-soft { fill: #eef6ff; stroke: #2f7dc3; stroke-width: 2; rx: 18; ry: 18; }
    .label { font: 700 16px 'Avenir Next', 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #0d5ea6; letter-spacing: 0.08em; text-transform: uppercase; }
    .text { font: 15px 'Avenir Next', 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #1b2733; }
    .arrow { stroke: #0d5ea6; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .arrow-soft { stroke: #2f7dc3; stroke-width: 3; fill: none; marker-end: url(#arrowSoft); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0d5ea6"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f7dc3"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="470" rx="28" ry="28"/>

  <rect class="box" x="60" y="120" width="220" height="96" rx="18" ry="18"/>
  <text class="label" x="92" y="152">INPUT</text>
  <text class="text" x="92" y="180">要求 / メモ / 資料 / 問題</text>

  <rect class="box" x="360" y="120" width="300" height="96" rx="18" ry="18"/>
  <text class="label" x="392" y="152">PROCESS</text>
  <text class="text" x="392" y="180">解釈 / 調査 / 生成 / 検証 / 保存判断</text>

  <rect class="box" x="740" y="120" width="270" height="96" rx="18" ry="18"/>
  <text class="label" x="772" y="152">OUTPUT</text>
  <text class="text" x="772" y="180">回答 / skill / note / report /</text>
  <text class="text" x="772" y="202">code</text>

  <rect class="box" x="1120" y="120" width="300" height="96" rx="18" ry="18"/>
  <text class="label" x="1152" y="152">NEXT INPUT</text>
  <text class="text" x="1152" y="180">次の依頼 / 次の判断材料 /</text>
  <text class="text" x="1152" y="202">次の作業入口</text>

  <rect class="box-soft" x="360" y="300" width="300" height="104" rx="18" ry="18"/>
  <text class="label" x="392" y="332">CONTEXT</text>
  <text class="text" x="392" y="360">.memory / .agents / .tools / docs / rules</text>

  <rect class="box-soft" x="740" y="300" width="360" height="104" rx="18" ry="18"/>
  <text class="label" x="772" y="332">CONTEXT UPDATE</text>
  <text class="text" x="772" y="360">memory更新 / skill改善 / index反映 /</text>
  <text class="text" x="772" y="382">運用ルール調整</text>

  <path class="arrow" d="M280 168 H348"/>
  <path class="arrow" d="M660 168 H728"/>
  <path class="arrow" d="M1010 168 H1108"/>
  <path class="arrow-soft" d="M510 300 V228"/>
  <path class="arrow-soft" d="M875 216 V288"/>
  <path class="arrow-soft" d="M740 352 H672"/>
</svg>
